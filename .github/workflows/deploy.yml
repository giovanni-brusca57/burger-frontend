name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  setup:
    name: Compute image name
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.img.outputs.image }}
    steps:
      - id: img
        run: echo "image=ghcr.io/${OWNER,,}/burger-frontend" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

  build:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.setup.outputs.image }}:latest
            ${{ needs.setup.outputs.image }}:sha-${{ github.sha }}
          # VITE_* di-bake saat build. VITE_API_URL kosong = same-origin (nginx proxy ke backend).
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_DEFAULT_REFERRAL=${{ secrets.VITE_DEFAULT_REFERRAL }}
            VITE_MEV_PAGE=${{ secrets.VITE_MEV_PAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [setup, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.yml
          target: ~/burger-fe/

      - name: Pull image & restart
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_NAME: ${{ needs.setup.outputs.image }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR,IMAGE_NAME
          script: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            cd ~/burger-fe
            export IMAGE="${IMAGE_NAME}:latest"
            docker compose pull app
            docker compose up -d
            docker image prune -f
