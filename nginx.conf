# ── api.burgermev.com → backend (API-only: root, /api/docs, semua route) ────
server {
    listen 80;
    listen 443 ssl;
    server_name api.burgermev.com;

    # Self-signed origin cert (mounted at runtime). Cloudflare "Full" mode
    # connects over HTTPS and accepts this cert; the same cert covers www + api.
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # This domain is pure backend — proxy EVERYTHING (bare `/`, `/api/docs`
    # Swagger, and every API route) straight to the NestJS container.
    location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }
}

# ── www.burgermev.com (+ apex + any other host) → SPA ───────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name www.burgermev.com burgermev.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    root /usr/share/nginx/html;
    index index.html;

    # The SPA calls the API cross-origin at api.burgermev.com (VITE_API_URL),
    # but keep these prefixes proxied so a same-origin call to
    # www.burgermev.com/<route> still reaches the backend as a fallback.
    # presale is special: bare "/presale" is the SPA page; only "/presale/..." is API.
    location ~ ^/presale/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    location ~ ^/(auth|admin|deposit|feature-flags|jackpot|mev|trading-profit|wallet)(/|$) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # ── SPA ────────────────────────────────────────────────────────────
    # React Router — semua route dikembalikan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
