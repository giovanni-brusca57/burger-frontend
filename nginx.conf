server {
    listen 80;
    listen 443 ssl;
    server_name _;

    # Self-signed origin cert (mounted at runtime). Cloudflare "Full" mode
    # connects to the origin over HTTPS and accepts this cert; end-users get
    # Cloudflare's trusted edge cert for the domain.
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy ──────────────────────────────────────────────
    # Backend (NestJS) routes live at the root (/auth, /wallet, ...). We proxy
    # those prefixes to the backend container so the whole app is same-origin.
    # Required because the domain sits behind Cloudflare, which only proxies
    # standard ports — the backend can't be exposed on :3000 through the CDN.
    # (Cloudflare terminates TLS and forwards the scheme in X-Forwarded-Proto.)

    # presale is special: bare "/presale" is the SPA page; only "/presale/..." is API.
    location ~ ^/presale/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # All other backend prefixes (bare or with sub-path).
    location ~ ^/(auth|admin|deposit|feature-flags|jackpot|mev|trading-profit|wallet)(/|$) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # ── SPA ────────────────────────────────────────────────────────────
    # React Router — semua route dikembalikan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
