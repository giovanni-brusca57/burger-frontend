<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" fill="none">
  <defs>
    <radialGradient id="ke-halo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#F472B6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7E22CE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ke-chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FBCFE8"/>
      <stop offset="0.5" stop-color="#EC4899"/>
      <stop offset="1"   stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="ke-core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FF2BD6"/>
    </linearGradient>
  </defs>

  <ellipse cx="48" cy="40" rx="44" ry="32" fill="url(#ke-halo)"/>

  <!-- circuit traces around (background) -->
  <g stroke="#FF2BD6" stroke-width="0.7" stroke-opacity="0.45" fill="none">
    <path d="M 4 18 L 14 18 L 14 12 L 24 12"/>
    <path d="M 4 62 L 14 62 L 14 68 L 26 68"/>
    <path d="M 92 18 L 82 18 L 82 12 L 70 12"/>
    <path d="M 92 62 L 82 62 L 82 68 L 70 68"/>
    <circle cx="14" cy="18" r="1.2" fill="#FF2BD6" stroke="none"/>
    <circle cx="82" cy="62" r="1.2" fill="#FF2BD6" stroke="none"/>
  </g>

  <!-- chip pins (top/bottom) -->
  <g fill="#FBCFE8">
    <rect x="32" y="14" width="3" height="6" rx="0.5"/>
    <rect x="40" y="14" width="3" height="6" rx="0.5"/>
    <rect x="48" y="14" width="3" height="6" rx="0.5"/>
    <rect x="56" y="14" width="3" height="6" rx="0.5"/>
    <rect x="32" y="60" width="3" height="6" rx="0.5"/>
    <rect x="40" y="60" width="3" height="6" rx="0.5"/>
    <rect x="48" y="60" width="3" height="6" rx="0.5"/>
    <rect x="56" y="60" width="3" height="6" rx="0.5"/>
  </g>
  <!-- chip pins (left/right) -->
  <g fill="#FBCFE8">
    <rect x="14" y="32" width="6" height="3" rx="0.5"/>
    <rect x="14" y="40" width="6" height="3" rx="0.5"/>
    <rect x="14" y="48" width="6" height="3" rx="0.5"/>
    <rect x="76" y="32" width="6" height="3" rx="0.5"/>
    <rect x="76" y="40" width="6" height="3" rx="0.5"/>
    <rect x="76" y="48" width="6" height="3" rx="0.5"/>
  </g>

  <!-- main chip body -->
  <rect x="20" y="20" width="56" height="40" rx="4" fill="url(#ke-chip)" stroke="#FBCFE8" stroke-width="1.2"/>
  <!-- inner highlight -->
  <rect x="22" y="22" width="52" height="2" rx="1" fill="#fff" opacity="0.35"/>

  <!-- core lightning bolt -->
  <g transform="translate(48 40)">
    <path d="M -4 -12 L 4 -2 L -2 -2 L 4 12 L -4 0 L 2 0 Z"
          fill="url(#ke-core)" stroke="#FFF1F2" stroke-width="0.6" stroke-linejoin="round"/>
  </g>

  <!-- glow specks -->
  <g fill="#FBCFE8" opacity="0.85">
    <path d="M 6 8 L 8 5 L 10 8 L 8 11 Z"/>
    <path d="M 86 70 L 88 67 L 90 70 L 88 73 Z"/>
  </g>
</svg>
