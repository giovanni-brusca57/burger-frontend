<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <!-- core fluid gradient: cream → orange → deep red -->
    <radialGradient id="fluid-core" cx="0.45" cy="0.42" r="0.75">
      <stop offset="0"    stop-color="#FFE0B5"/>
      <stop offset="0.18" stop-color="#FFB272"/>
      <stop offset="0.45" stop-color="#F97316"/>
      <stop offset="0.75" stop-color="#DC2626"/>
      <stop offset="1"    stop-color="#4B0E0A" stop-opacity="0.95"/>
    </radialGradient>

    <!-- bright highlight: lemon yellow → orange -->
    <radialGradient id="fluid-hilite" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0"   stop-color="#FFF7CC"/>
      <stop offset="0.4" stop-color="#FACC15"/>
      <stop offset="1"   stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>

    <!-- secondary swirl (deep amber) -->
    <linearGradient id="fluid-swirl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#FACC15"/>
      <stop offset="0.5" stop-color="#F97316"/>
      <stop offset="1"   stop-color="#9A3412"/>
    </linearGradient>

    <!-- ambient halo glow -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0"   stop-color="#FF6B35" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#F97316" stop-opacity="0.12"/>
      <stop offset="1"   stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>

    <!-- soft blur for fluid edges -->
    <filter id="softblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="medblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- left-to-right fade mask: solid on right, transparent on left -->
    <linearGradient id="fade-mask" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#000" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="0.6"  stop-color="#fff"/>
      <stop offset="1"    stop-color="#fff"/>
    </linearGradient>
    <mask id="rightFade" maskContentUnits="objectBoundingBox">
      <rect width="1" height="1" fill="url(#fade-mask)"/>
    </mask>
  </defs>

  <g mask="url(#rightFade)">
    <!-- ambient halo background -->
    <ellipse cx="500" cy="250" rx="360" ry="280" fill="url(#halo)" filter="url(#medblur)"/>

    <!-- main fluid mass — large organic swirl -->
    <path
      d="M 340 60
         Q 470 50 555 145
         Q 640 240 615 340
         Q 590 440 470 470
         Q 350 500 270 430
         Q 190 360 210 270
         Q 230 180 280 130
         Q 310 95 340 60 Z"
      fill="url(#fluid-core)"
      filter="url(#softblur)"
    />

    <!-- secondary curve — twist overlay -->
    <path
      d="M 380 130
         Q 510 150 540 260
         Q 570 370 460 420
         Q 350 470 310 380
         Q 270 290 320 220
         Q 360 160 380 130 Z"
      fill="url(#fluid-swirl)"
      opacity="0.75"
      filter="url(#softblur)"
    />

    <!-- inner accent swirl (lemon-yellow heart) -->
    <path
      d="M 400 180
         Q 480 190 490 270
         Q 500 350 420 370
         Q 340 390 340 310
         Q 340 230 400 180 Z"
      fill="url(#fluid-hilite)"
      opacity="0.85"
    />

    <!-- top-right highlight blob -->
    <ellipse cx="500" cy="200" rx="70" ry="50" fill="#FFE6BD" opacity="0.55" filter="url(#softblur)"/>
    <ellipse cx="480" cy="180" rx="28" ry="18" fill="#FFFEF0" opacity="0.55" filter="url(#softblur)"/>

    <!-- bottom drip -->
    <ellipse cx="430" cy="450" rx="60" ry="22" fill="#7C2D12" opacity="0.6" filter="url(#softblur)"/>

    <!-- faint embers (small specks) -->
    <g opacity="0.7">
      <circle cx="610" cy="120" r="3.5" fill="#FACC15"/>
      <circle cx="640" cy="170" r="2"   fill="#FFB272"/>
      <circle cx="180" cy="320" r="2.5" fill="#FACC15" opacity="0.55"/>
      <circle cx="660" cy="380" r="3"   fill="#FB923C"/>
      <circle cx="600" cy="450" r="2"   fill="#FACC15" opacity="0.7"/>
    </g>
  </g>
</svg>
