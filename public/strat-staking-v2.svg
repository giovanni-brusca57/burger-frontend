<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <defs>
    <radialGradient id="st-halo" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#FACC15" stop-opacity="0.24"/>
      <stop offset="0.7" stop-color="#FACC15" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FACC15" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="st-coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.5" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="st-face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- halo -->
  <ellipse cx="80" cy="60" rx="66" ry="48" fill="url(#st-halo)"/>

  <!-- corner ticks -->
  <path d="M10 18v-8h8M150 18v-8h-8M10 102v8h8M150 102v8h-8" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2" stroke-linecap="round"/>

  <!-- orbit arc + dots -->
  <path d="M26 40a58 44 0 0 1 24-18" stroke="#FACC15" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="2 5" stroke-linecap="round"/>
  <circle cx="50" cy="22" r="2.2" fill="#FDE68A"/>
  <circle cx="26" cy="90" r="1.8" fill="#FDE68A" opacity="0.7"/>

  <!-- coin stack (3 cylinders) -->
  <g>
    <path d="M42 80c0 5.5 12.5 10 28 10s28-4.5 28-10v-8H42v8Z" fill="url(#st-coin)"/>
    <ellipse cx="70" cy="72" rx="28" ry="9.5" fill="url(#st-face)"/>
    <ellipse cx="70" cy="72" rx="28" ry="9.5" stroke="#92400E" stroke-opacity="0.35" stroke-width="1"/>
  </g>
  <g>
    <path d="M42 66c0 5.5 12.5 10 28 10s28-4.5 28-10v-8H42v8Z" fill="url(#st-coin)"/>
    <ellipse cx="70" cy="58" rx="28" ry="9.5" fill="url(#st-face)"/>
    <ellipse cx="70" cy="58" rx="28" ry="9.5" stroke="#92400E" stroke-opacity="0.35" stroke-width="1"/>
  </g>
  <g>
    <path d="M42 52c0 5.5 12.5 10 28 10s28-4.5 28-10v-8H42v8Z" fill="url(#st-coin)"/>
    <ellipse cx="70" cy="44" rx="28" ry="9.5" fill="url(#st-face)"/>
    <ellipse cx="70" cy="44" rx="28" ry="9.5" stroke="#92400E" stroke-opacity="0.4" stroke-width="1.2"/>
    <!-- top face mark -->
    <path d="M70 38.2v11.6M66 41c1-1.6 6.5-1.8 7.4.4.9 2-1.6 3-3.4 3.4-1.8.4-4.6 1.2-3.8 3.3.8 2.2 6.4 2.1 7.6.3" stroke="#B45309" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  <!-- rim shine -->
  <path d="M46 40a28 9.5 0 0 1 14-4.6" stroke="#FFFBEB" stroke-opacity="0.8" stroke-width="1.6" stroke-linecap="round"/>

  <!-- growth arrow sweeping up -->
  <path d="M104 84C116 76 124 62 126 44" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <path d="M119 48l7-5 2 8.6" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="104" cy="84" r="2.6" fill="#6EE7B7"/>

  <!-- ground glow -->
  <ellipse cx="76" cy="96" rx="42" ry="4.5" fill="#FACC15" opacity="0.16"/>
</svg>
