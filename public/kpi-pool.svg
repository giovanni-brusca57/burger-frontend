<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" fill="none">
  <defs>
    <radialGradient id="kp-halo" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#FCD34D" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#B45309" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kp-coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FEF3C7"/>
      <stop offset="0.5" stop-color="#FACC15"/>
      <stop offset="1"   stop-color="#A16207"/>
    </linearGradient>
    <linearGradient id="kp-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CA8A04"/>
      <stop offset="1" stop-color="#5B2A0F"/>
    </linearGradient>
  </defs>

  <ellipse cx="48" cy="42" rx="44" ry="32" fill="url(#kp-halo)"/>

  <!-- coin stack (4 coins ascending) -->
  <g transform="translate(48 50)">
    <ellipse cx="0" cy="18"  rx="26" ry="6" fill="url(#kp-edge)"/>
    <ellipse cx="0" cy="10"  rx="26" ry="6" fill="url(#kp-coin)" stroke="#7C2D12" stroke-width="0.7"/>
    <ellipse cx="0" cy="2"   rx="26" ry="6" fill="url(#kp-coin)" stroke="#7C2D12" stroke-width="0.7"/>
    <ellipse cx="0" cy="-6"  rx="26" ry="6" fill="url(#kp-coin)" stroke="#7C2D12" stroke-width="0.7"/>
    <ellipse cx="0" cy="-14" rx="26" ry="6" fill="url(#kp-coin)" stroke="#7C2D12" stroke-width="0.7"/>
    <!-- top coin face $ symbol -->
    <text y="-11" text-anchor="middle"
          font-family="'JetBrains Mono', monospace"
          font-size="8" font-weight="800" fill="#7C2D12">$</text>
    <!-- edge highlights -->
    <line x1="-22" y1="-14" x2="22" y2="-14" stroke="#FEF3C7" stroke-opacity="0.55" stroke-width="0.5"/>
    <line x1="-22" y1="-6"  x2="22" y2="-6"  stroke="#FEF3C7" stroke-opacity="0.4"  stroke-width="0.5"/>
  </g>

  <!-- gold sparkles -->
  <g fill="#FEF3C7" opacity="0.85">
    <path d="M 14 16 L 16 13 L 18 16 L 16 19 Z"/>
    <path d="M 78 18 L 80 15 L 82 18 L 80 21 Z"/>
    <circle cx="84" cy="58" r="1.4"/>
  </g>
</svg>
