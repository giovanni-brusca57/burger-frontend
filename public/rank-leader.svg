<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <radialGradient id="sv-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#E5E7EB" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#475569" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sv-star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#F8FAFC"/>
      <stop offset="0.45" stop-color="#CBD5E1"/>
      <stop offset="1"   stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="sv-ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5E7EB" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#E5E7EB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <ellipse cx="100" cy="80" rx="92" ry="60" fill="url(#sv-glow)"/>

  <!-- 4 rays behind star -->
  <g transform="translate(100 80)">
    <rect x="-1.5" y="-58" width="3" height="38" fill="url(#sv-ray)"/>
    <rect x="-1.5" y="20"  width="3" height="38" fill="url(#sv-ray)" transform="rotate(180)"/>
    <rect x="-1.5" y="-58" width="3" height="38" fill="url(#sv-ray)" transform="rotate(90)"/>
    <rect x="-1.5" y="-58" width="3" height="38" fill="url(#sv-ray)" transform="rotate(-90)"/>
  </g>

  <!-- 5-point silver star -->
  <g transform="translate(100 80)">
    <path
      d="M 0 -36
         L 10.6 -11
         L 36.4 -11
         L 15.3 5
         L 22.4 30
         L 0 14
         L -22.4 30
         L -15.3 5
         L -36.4 -11
         L -10.6 -11 Z"
      fill="url(#sv-star)"
      stroke="#F8FAFC"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
    <!-- inner star line -->
    <path
      d="M 0 -22
         L 6 -7
         L 22 -7
         L 9 4
         L 14 20
         L 0 9
         L -14 20
         L -9 4
         L -22 -7
         L -6 -7 Z"
      fill="none"
      stroke="#fff"
      stroke-opacity="0.65"
      stroke-width="0.8"
    />
    <!-- center sparkle -->
    <path d="M -3 -2 L 0 -5 L 3 -2 L 0 1 Z" fill="#fff"/>
  </g>

  <!-- silver sparkles -->
  <g fill="#F8FAFC" opacity="0.85">
    <path d="M 36 38 L 38 35 L 40 38 L 38 41 Z"/>
    <path d="M 160 42 L 162 39 L 164 42 L 162 45 Z"/>
    <path d="M 168 122 L 170 119 L 172 122 L 170 125 Z"/>
    <circle cx="28" cy="120" r="1.5"/>
  </g>
</svg>
