<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <defs>
    <radialGradient id="lp-halo" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.26"/>
      <stop offset="0.7" stop-color="#34D399" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lp-coinA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset="0.55" stop-color="#34D399"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="lp-coinB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#99F6E4"/>
      <stop offset="0.55" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <!-- halo -->
  <ellipse cx="80" cy="60" rx="66" ry="48" fill="url(#lp-halo)"/>

  <!-- corner ticks -->
  <path d="M10 18v-8h8M150 18v-8h-8M10 102v8h8M150 102v8h-8" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2" stroke-linecap="round"/>

  <!-- orbit arc + sparks -->
  <path d="M132 36a58 44 0 0 1 2 46" stroke="#34D399" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="2 5" stroke-linecap="round"/>
  <circle cx="132" cy="36" r="2.2" fill="#6EE7B7"/>
  <circle cx="30" cy="86" r="1.8" fill="#6EE7B7" opacity="0.7"/>

  <!-- coin pair -->
  <circle cx="65" cy="48" r="21" fill="url(#lp-coinA)"/>
  <circle cx="65" cy="48" r="21" stroke="#D1FAE5" stroke-opacity="0.6" stroke-width="1.4"/>
  <circle cx="95" cy="48" r="21" fill="url(#lp-coinB)" fill-opacity="0.92"/>
  <circle cx="95" cy="48" r="21" stroke="#CCFBF1" stroke-opacity="0.6" stroke-width="1.4"/>

  <!-- overlap lens glow -->
  <path d="M80 30.5a21 21 0 0 1 0 35 21 21 0 0 1 0-35Z" fill="#ECFDF5" opacity="0.28"/>

  <!-- plus in the lens -->
  <path d="M80 40v16M72 48h16" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round"/>

  <!-- coin inner marks -->
  <path d="M56 42a12 12 0 0 1 6-5" stroke="#ECFDF5" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round"/>
  <path d="M104 42a12 12 0 0 0-6-5" stroke="#ECFDF5" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round"/>

  <!-- droplet falling into pool -->
  <path d="M80 74c2.4 3 3.6 5 3.6 7a3.6 3.6 0 1 1-7.2 0c0-2 1.2-4 3.6-7Z" fill="#6EE7B7"/>

  <!-- pool ripples -->
  <ellipse cx="80" cy="94" rx="30" ry="6.5" stroke="#34D399" stroke-opacity="0.75" stroke-width="2"/>
  <ellipse cx="80" cy="94" rx="17" ry="3.6" stroke="#6EE7B7" stroke-opacity="0.5" stroke-width="1.6"/>
  <ellipse cx="80" cy="94" rx="42" ry="9" stroke="#34D399" stroke-opacity="0.25" stroke-width="1.4"/>
</svg>
