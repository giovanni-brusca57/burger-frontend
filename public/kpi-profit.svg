<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" fill="none">
  <defs>
    <radialGradient id="kr-halo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#4ADE80" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#14532D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kr-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ADE80" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4ADE80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="kr-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ECFCCB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <ellipse cx="48" cy="44" rx="44" ry="32" fill="url(#kr-halo)"/>

  <!-- baseline grid (dashed faint) -->
  <g stroke="#22C55E" stroke-width="0.4" stroke-opacity="0.25" stroke-dasharray="2 2">
    <line x1="8"  y1="60" x2="88" y2="60"/>
    <line x1="8"  y1="48" x2="88" y2="48"/>
    <line x1="8"  y1="36" x2="88" y2="36"/>
  </g>

  <!-- area fill under line -->
  <path d="M 12 56 Q 24 52 32 46 T 52 32 T 80 14 L 80 64 L 12 64 Z"
        fill="url(#kr-area)"/>

  <!-- chart line -->
  <path d="M 12 56 Q 24 52 32 46 T 52 32 T 80 14"
        stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- chart point markers -->
  <g fill="#ECFCCB" stroke="#22C55E" stroke-width="1.2">
    <circle cx="12" cy="56" r="2"/>
    <circle cx="32" cy="46" r="2"/>
    <circle cx="52" cy="32" r="2"/>
    <circle cx="80" cy="14" r="2.5"/>
  </g>

  <!-- arrow up at end -->
  <g transform="translate(80 14)" stroke="url(#kr-arrow)" stroke-width="2.4" stroke-linecap="round" fill="none">
    <line x1="0" y1="0" x2="0" y2="-8"/>
    <polyline points="-3,-5 0,-8 3,-5"/>
  </g>

  <!-- +% chip -->
  <g transform="translate(20 20)">
    <rect x="-12" y="-5" width="22" height="10" rx="5"
          fill="rgba(34,197,94,0.18)" stroke="#22C55E" stroke-width="0.9"/>
    <text x="-1" y="2" text-anchor="middle"
          font-family="'JetBrains Mono', monospace"
          font-size="6" font-weight="800" fill="#22C55E">+24%</text>
  </g>

  <!-- sparkles -->
  <g fill="#ECFCCB" opacity="0.85">
    <path d="M 88 70 L 90 67 L 92 70 L 90 73 Z"/>
    <circle cx="10" cy="14" r="1.2"/>
  </g>
</svg>
