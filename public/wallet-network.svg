<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="wn-halo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wn-node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9D5FF"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <ellipse cx="40" cy="40" rx="34" ry="26" fill="url(#wn-halo)"/>

  <!-- connecting lines -->
  <g stroke="#A78BFA" stroke-width="0.9" stroke-opacity="0.6" stroke-linecap="round">
    <line x1="40" y1="38" x2="18" y2="22"/>
    <line x1="40" y1="38" x2="62" y2="22"/>
    <line x1="40" y1="38" x2="14" y2="58"/>
    <line x1="40" y1="38" x2="66" y2="58"/>
    <line x1="40" y1="38" x2="40" y2="62"/>
  </g>

  <!-- center node (parent) -->
  <g transform="translate(40 38)">
    <circle r="8" fill="url(#wn-node)" stroke="#F3E8FF" stroke-width="1.2"/>
    <text y="2.4" text-anchor="middle"
          font-family="'JetBrains Mono', monospace"
          font-size="6" font-weight="800" fill="#3B0764">YOU</text>
  </g>

  <!-- 5 child nodes -->
  <g fill="url(#wn-node)" stroke="#F3E8FF" stroke-width="0.7">
    <circle cx="18" cy="22" r="3.6"/>
    <circle cx="62" cy="22" r="3.6"/>
    <circle cx="14" cy="58" r="3.6"/>
    <circle cx="66" cy="58" r="3.6"/>
    <circle cx="40" cy="62" r="3.6"/>
  </g>

  <!-- + level badges -->
  <g fill="#E9D5FF" font-family="'JetBrains Mono', monospace" font-size="3" font-weight="800">
    <text x="18" y="23.3" text-anchor="middle" fill="#3B0764">L1</text>
    <text x="62" y="23.3" text-anchor="middle" fill="#3B0764">L1</text>
    <text x="14" y="59.3" text-anchor="middle" fill="#3B0764">L2</text>
    <text x="66" y="59.3" text-anchor="middle" fill="#3B0764">L2</text>
    <text x="40" y="63.3" text-anchor="middle" fill="#3B0764">L3</text>
  </g>

  <!-- sparkles -->
  <g fill="#E9D5FF" opacity="0.85">
    <path d="M 8 38 L 9 36 L 10 38 L 9 40 Z"/>
    <circle cx="72" cy="38" r="0.9"/>
  </g>
</svg>
