<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none">
  <defs>
    <radialGradient id="tu-glow" cx="0.5" cy="0.55" r="0.65">
      <stop offset="0" stop-color="oklch(0.74 0.20 45)" stop-opacity="0.45"/>
      <stop offset="1" stop-color="oklch(0.74 0.20 45)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tu-coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FEF3C7"/>
      <stop offset="0.5" stop-color="#FACC15"/>
      <stop offset="1"   stop-color="#A16207"/>
    </linearGradient>
    <linearGradient id="tu-diamond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ECFEFF"/>
      <stop offset="0.5" stop-color="#67E8F9"/>
      <stop offset="1"   stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- ambient halo -->
  <ellipse cx="60" cy="58" rx="56" ry="38" fill="url(#tu-glow)"/>

  <!-- profit ceiling line (dashed) being broken through -->
  <g stroke="oklch(0.74 0.20 45)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.7">
    <line x1="14" y1="38" x2="48" y2="38"/>
    <line x1="74" y1="38" x2="106" y2="38"/>
  </g>

  <!-- ceiling label "LIMIT" -->
  <text x="60" y="14" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="6" font-weight="700"
        fill="oklch(0.74 0.20 45)" letter-spacing="2">LIMIT</text>

  <!-- ascending arrow through ceiling -->
  <g stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="60" y1="76" x2="60" y2="26"/>
    <polyline points="54,32 60,26 66,32"/>
  </g>

  <!-- coin stack ascending (3 coins, smallest at top) -->
  <g stroke="#7C2D12" stroke-width="0.7">
    <ellipse cx="35" cy="80" rx="14" ry="4" fill="url(#tu-coin)"/>
    <ellipse cx="35" cy="74" rx="14" ry="4" fill="url(#tu-coin)"/>
    <ellipse cx="35" cy="68" rx="14" ry="4" fill="url(#tu-coin)"/>
  </g>
  <text x="35" y="71" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="5" font-weight="800" fill="#7C2D12">$</text>

  <!-- floating "+$500" chip -->
  <g transform="translate(85 60)">
    <rect x="-14" y="-7" width="28" height="14" rx="7"
          fill="oklch(0.22 0.012 250)"
          stroke="#22C55E" stroke-width="1"/>
    <text y="2" text-anchor="middle"
          font-family="'JetBrains Mono', monospace"
          font-size="6" font-weight="800" fill="#22C55E">+$500</text>
  </g>

  <!-- diamond above ceiling (the unlock marker) -->
  <g transform="translate(85 22)">
    <path d="M 0 -8 L 6 -2 L 0 12 L -6 -2 Z" fill="url(#tu-diamond)"
          stroke="#ECFEFF" stroke-width="0.7"/>
    <path d="M -6 -2 L 6 -2" stroke="#fff" stroke-opacity="0.6" stroke-width="0.4"/>
  </g>

  <!-- sparkles -->
  <g fill="#FEF3C7" opacity="0.85">
    <path d="M 16 20 L 17 18 L 18 20 L 17 22 Z"/>
    <path d="M 100 50 L 101 48 L 102 50 L 101 52 Z"/>
    <circle cx="105" cy="80" r="1.2"/>
    <circle cx="14" cy="62" r="1.2"/>
  </g>
</svg>
