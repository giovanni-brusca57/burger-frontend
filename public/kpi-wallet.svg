<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" fill="none">
  <defs>
    <radialGradient id="kw-halo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0E7490" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kw-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#A5F3FC"/>
      <stop offset="0.45" stop-color="#0EA5E9"/>
      <stop offset="1"   stop-color="#0C4A6E"/>
    </linearGradient>
    <linearGradient id="kw-flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="kw-bill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <ellipse cx="48" cy="40" rx="44" ry="30" fill="url(#kw-halo)"/>

  <!-- bill peeking out top -->
  <g transform="translate(48 30) rotate(-6)">
    <rect x="-18" y="-6" width="36" height="14" rx="1.5" fill="url(#kw-bill)" stroke="#14532D" stroke-width="0.7"/>
    <circle cx="0" cy="1" r="3.5" fill="none" stroke="#14532D" stroke-width="0.6"/>
    <text y="3" text-anchor="middle"
          font-family="'JetBrains Mono', monospace"
          font-size="5" font-weight="800" fill="#14532D">$</text>
    <line x1="-14" y1="-3" x2="-8" y2="-3" stroke="#14532D" stroke-width="0.4"/>
    <line x1="8"   y1="-3" x2="14"  y2="-3" stroke="#14532D" stroke-width="0.4"/>
  </g>

  <!-- wallet body (folded) -->
  <g transform="translate(48 50)">
    <!-- back panel -->
    <rect x="-30" y="-12" width="60" height="22" rx="3" fill="url(#kw-body)" stroke="#A5F3FC" stroke-width="1.2"/>
    <!-- front flap (slightly raised) -->
    <path d="M -30 -2 L 30 -2 L 30 10 L -30 10 Z" fill="url(#kw-flap)" stroke="#A5F3FC" stroke-width="1"/>
    <!-- inner crease line -->
    <line x1="-30" y1="-2" x2="30" y2="-2" stroke="#0C4A6E" stroke-width="0.6"/>
    <!-- clasp dot -->
    <circle cx="22" cy="4" r="2.2" fill="#A5F3FC" stroke="#0C4A6E" stroke-width="0.5"/>
    <circle cx="22" cy="4" r="0.8" fill="#0EA5E9"/>
    <!-- highlight strip -->
    <line x1="-28" y1="-9" x2="-6" y2="-9" stroke="#fff" stroke-opacity="0.45" stroke-width="0.6"/>
  </g>

  <!-- cyan sparkles -->
  <g fill="#A5F3FC" opacity="0.85">
    <path d="M 10 16 L 12 13 L 14 16 L 12 19 Z"/>
    <path d="M 82 12 L 84 9 L 86 12 L 84 15 Z"/>
    <circle cx="86" cy="56" r="1.4"/>
  </g>
</svg>
