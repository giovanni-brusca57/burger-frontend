<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="pattyBase" cx="0.5" cy="0.4">
      <stop offset="0" stop-color="#7C2D12"/>
      <stop offset="0.6" stop-color="#5B1F0A"/>
      <stop offset="1" stop-color="#3D1305"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" fill="url(#pattyBase)"/>
  <!-- grill char spots -->
  <g fill="#1F0902" opacity="0.55">
    <ellipse cx="22"  cy="18"  rx="4"   ry="2.5"/>
    <ellipse cx="62"  cy="34"  rx="5"   ry="3"/>
    <ellipse cx="100" cy="22"  rx="3.5" ry="2"/>
    <ellipse cx="32"  cy="52"  rx="3"   ry="2"/>
    <ellipse cx="78"  cy="58"  rx="6"   ry="3.5"/>
    <ellipse cx="14"  cy="78"  rx="5"   ry="3"/>
    <ellipse cx="44"  cy="94"  rx="4"   ry="2.5"/>
    <ellipse cx="92"  cy="86"  rx="4.5" ry="2.8"/>
    <ellipse cx="106" cy="106" rx="3.5" ry="2.2"/>
  </g>
  <!-- glistening highlights -->
  <g fill="#F4A261" opacity="0.15">
    <ellipse cx="40" cy="30" rx="3" ry="1.6"/>
    <ellipse cx="84" cy="70" rx="3" ry="1.6"/>
    <ellipse cx="24" cy="64" rx="2" ry="1"/>
    <ellipse cx="68" cy="100" rx="2" ry="1.2"/>
  </g>
  <!-- diagonal grill stripes (subtle) -->
  <g stroke="#1F0902" stroke-width="1.2" opacity="0.18">
    <line x1="-20" y1="40"  x2="140" y2="20"/>
    <line x1="-20" y1="80"  x2="140" y2="60"/>
    <line x1="-20" y1="120" x2="140" y2="100"/>
  </g>
</svg>
