<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="wt-halo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#FACC15" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C2D12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wt-bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="0.5" stop-color="#FACC15"/>
      <stop offset="1" stop-color="#A16207"/>
    </linearGradient>
    <linearGradient id="wt-bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
  <ellipse cx="40" cy="40" rx="34" ry="26" fill="url(#wt-halo)"/>

  <!-- candle bars (background) -->
  <g opacity="0.7">
    <rect x="10" y="48" width="4" height="14" rx="0.8" fill="url(#wt-bar)"/>
    <rect x="17" y="40" width="4" height="22" rx="0.8" fill="url(#wt-bar)"/>
    <rect x="59" y="30" width="4" height="32" rx="0.8" fill="url(#wt-bar)"/>
    <rect x="66" y="22" width="4" height="40" rx="0.8" fill="url(#wt-bar)"/>
  </g>

  <!-- lightning bolt center (the engine) -->
  <g transform="translate(40 38)">
    <path d="M -4 -16 L 6 -2 L -1 -2 L 4 14 L -6 0 L 1 0 Z"
          fill="url(#wt-bolt)" stroke="#7C2D12" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M -4 -16 L 6 -2 L -1 -2 L 4 14"
          stroke="#fff" stroke-opacity="0.45" stroke-width="0.4" fill="none"/>
  </g>

  <!-- arrow up trail -->
  <g stroke="#22C55E" stroke-width="1.2" stroke-linecap="round" fill="none">
    <path d="M 28 60 L 42 46 L 56 36"/>
    <polyline points="52,36 56,36 56,40"/>
  </g>

  <!-- sparkles -->
  <g fill="#FEF3C7" opacity="0.85">
    <path d="M 14 22 L 15 20 L 16 22 L 15 24 Z"/>
    <path d="M 56 16 L 57 14 L 58 16 L 57 18 Z"/>
    <circle cx="68" cy="62" r="0.9"/>
  </g>
</svg>
