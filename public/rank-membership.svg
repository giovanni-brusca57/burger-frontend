<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <radialGradient id="br-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#FBA56E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C2D12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="br-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FCDABA"/>
      <stop offset="0.45" stop-color="#CD7F32"/>
      <stop offset="1"   stop-color="#5B2A0F"/>
    </linearGradient>
    <linearGradient id="br-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E89968"/>
      <stop offset="1" stop-color="#7C3A12"/>
    </linearGradient>
  </defs>

  <ellipse cx="100" cy="80" rx="90" ry="60" fill="url(#br-glow)"/>

  <!-- bronze shield -->
  <g transform="translate(100 80)">
    <path
      d="M 0 -40 L 32 -28 L 32 8 Q 32 32 0 44 Q -32 32 -32 8 L -32 -28 Z"
      fill="url(#br-shield)"
      stroke="#FCDABA"
      stroke-width="1.5"
    />
    <!-- inner crest line -->
    <path
      d="M 0 -32 L 24 -22 L 24 4 Q 24 24 0 34 Q -24 24 -24 4 L -24 -22 Z"
      fill="none"
      stroke="#fff"
      stroke-opacity="0.45"
      stroke-width="0.8"
    />
    <!-- center bronze coin / medallion -->
    <circle r="14" fill="url(#br-band)" stroke="#FCDABA" stroke-width="1.2"/>
    <text y="4" text-anchor="middle"
          font-family="'JetBrains Mono', monospace"
          font-size="10" font-weight="800" fill="#FFF1DC">B</text>
    <!-- highlight glint top-left -->
    <path d="M -10 -8 L -6 -12" stroke="#FFF1DC" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- bronze sparkles -->
  <g fill="#FCDABA" opacity="0.75">
    <circle cx="40"  cy="40"  r="1.6"/>
    <circle cx="165" cy="50"  r="2"/>
    <circle cx="170" cy="118" r="1.4"/>
    <circle cx="30"  cy="120" r="1.8"/>
  </g>
</svg>
