<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <defs>
    <radialGradient id="mm-halo" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#FF2BD6" stop-opacity="0.24"/>
      <stop offset="0.7" stop-color="#FF2BD6" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FF2BD6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mm-candle" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#C026D3"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="mm-rocket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.6" stop-color="#FBCFE8"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="mm-flame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- halo -->
  <ellipse cx="80" cy="60" rx="66" ry="48" fill="url(#mm-halo)"/>

  <!-- corner ticks -->
  <path d="M10 18v-8h8M150 18v-8h-8M10 102v8h8M150 102v8h-8" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2" stroke-linecap="round"/>

  <!-- trajectory -->
  <path d="M40 92C62 88 84 74 102 52" stroke="#F472B6" stroke-opacity="0.5" stroke-width="1.6" stroke-dasharray="1.5 6" stroke-linecap="round"/>

  <!-- candlesticks -->
  <path d="M48 66v28M66 58v34M84 44v42" stroke="#F9A8D4" stroke-opacity="0.7" stroke-width="1.6"/>
  <rect x="42" y="72" width="12" height="16" rx="2.5" fill="url(#mm-candle)"/>
  <rect x="60" y="64" width="12" height="20" rx="2.5" fill="url(#mm-candle)"/>
  <rect x="78" y="50" width="12" height="26" rx="2.5" fill="url(#mm-candle)"/>
  <rect x="78" y="50" width="12" height="26" rx="2.5" stroke="#FBCFE8" stroke-opacity="0.6" stroke-width="1.2"/>

  <!-- rocket (45° up-right) -->
  <g transform="rotate(45 114 38)">
    <!-- flame -->
    <path d="M114 56c-3.4-5-3.4-9 0-13 3.4 4 3.4 8 0 13Z" fill="url(#mm-flame)"/>
    <!-- body -->
    <path d="M114 12c6 6 9 14 9 22 0 4-1.4 8-3.4 10.5h-11.2C106.4 42 105 38 105 34c0-8 3-16 9-22Z" fill="url(#mm-rocket)"/>
    <!-- fins -->
    <path d="M105.5 36c-4 2-6.3 5.4-6.8 9.5 3.4-.6 6.2-2 8.4-4.2M122.5 36c4 2 6.3 5.4 6.8 9.5-3.4-.6-6.2-2-8.4-4.2" fill="#EC4899"/>
    <!-- window -->
    <circle cx="114" cy="28" r="4.6" fill="#0E1420" stroke="#F9A8D4" stroke-width="1.6"/>
    <circle cx="112.6" cy="26.6" r="1.4" fill="#67E8F9"/>
  </g>

  <!-- speed lines -->
  <path d="M88 22l8 3M84 34l7 1" stroke="#F9A8D4" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round"/>

  <!-- sparkle stars -->
  <path d="M42 34l1.5 3.6 3.6 1.5-3.6 1.5-1.5 3.6-1.5-3.6-3.6-1.5 3.6-1.5 1.5-3.6Z" fill="#F9A8D4" opacity="0.9"/>
  <circle cx="132" cy="78" r="1.8" fill="#F472B6" opacity="0.7"/>
  <circle cx="58" cy="22" r="1.5" fill="#F472B6" opacity="0.5"/>

  <!-- ground glow -->
  <ellipse cx="70" cy="96" rx="38" ry="4" fill="#FF2BD6" opacity="0.15"/>
</svg>
